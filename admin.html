<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者パネル — 建施 模擬試験</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    /* ===================== LOGIN ===================== */
    #pg-login {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff; border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 44px 38px; width: 100%; max-width: 360px;
      text-align: center;
    }
    .login-logo { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .login-sub  { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 28px; }
    .pin-input {
      width: 100%; text-align: center; font-size: 1.5rem;
      letter-spacing: 0.4em; padding: 10px;
      border: 2px solid var(--border); border-radius: var(--radius);
      outline: none; margin-bottom: 16px;
      font-family: monospace;
    }
    .pin-input:focus { border-color: var(--primary-lt); box-shadow: 0 0 0 3px rgba(42,109,217,0.12); }
    .login-err {
      background: var(--danger-bg); color: var(--danger);
      border-radius: var(--radius); padding: 8px 14px;
      font-size: 0.83rem; margin-top: 10px; display: none;
    }

    /* ===================== TOPBAR ===================== */
    #topbar { display: none; }

    /* ===================== FOLDER / EXAM CARDS ===================== */
    .folder-section { margin-bottom: 24px; }
    .folder-header {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 10px 14px;
      background: var(--primary-bg); border-radius: var(--radius);
      border: 1.5px solid var(--border); user-select: none; margin-bottom: 8px;
    }
    .folder-header:hover { background: #dce7f7; }
    .folder-name    { font-weight: 700; font-size: 0.97rem; color: var(--primary); flex: 1; }
    .folder-chevron { color: var(--text-muted); transition: transform 0.2s; }
    .folder-header.collapsed .folder-chevron { transform: rotate(-90deg); }
    .folder-body    { display: flex; flex-direction: column; gap: 8px; }
    .folder-body.hidden { display: none; }

    .exam-card {
      background: #fff; border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 13px 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .exam-card-info  { flex: 1; min-width: 180px; }
    .exam-card-title { font-weight: 700; font-size: 0.97rem; margin-bottom: 3px; }
    .exam-card-meta  { font-size: 0.77rem; color: var(--text-muted); }
    .exam-card-actions { display: flex; gap: 7px; flex-wrap: wrap; }

    .toggle-wrap { display: flex; align-items: center; gap: 7px; }
    .toggle-lbl  { font-size: 0.78rem; color: var(--text-muted); }
    .toggle {
      appearance: none; width: 40px; height: 22px;
      background: #ccc; border-radius: 100px; position: relative;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle:checked { background: var(--success); }
    .toggle::after {
      content: ""; position: absolute;
      top: 3px; left: 3px; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; transition: left 0.2s;
    }
    .toggle:checked::after { left: 21px; }

    /* ===================== CREATE FORM ===================== */
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
    }
    @media(max-width:540px){ .form-row{ grid-template-columns: 1fr; } }

    .folder-wrap { position: relative; }
    #folder-suggestions {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow); z-index: 50; display: none;
    }
    .sug-item { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; }
    .sug-item:hover { background: var(--primary-bg); }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 6px;
    }
    .key-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; background: var(--neutral-bg);
      border: 1.5px solid var(--border); border-radius: var(--radius);
    }
    .key-row.filled { border-color: var(--primary-lt); background: var(--primary-bg); }
    .key-row.key-unanswered { border-color: var(--danger); background: var(--danger-bg); }
    .key-qnum { font-size: 0.8rem; font-weight: 700; color: var(--primary); min-width: 38px; }
    .key-choices { display: flex; gap: 4px; }
    .key-choices input[type="radio"] { display: none; }
    .key-choices label {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border: 1.5px solid #b0bec5;
      border-radius: 50%; font-size: 0.85rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.12s; user-select: none;
    }
    .key-choices input[type="radio"]:checked + label {
      background: var(--primary-lt); border-color: var(--primary-lt); color: #fff;
    }
    .key-choices label:hover { border-color: var(--primary-lt); color: var(--primary-lt); }
    .key-counter { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }

    /* ===================== RESULTS ===================== */
    .exam-info-bar { background: var(--primary); color: #fff; padding: 16px 24px; }
    .exam-info-bar h2 { font-size: 1.05rem; }
    .exam-info-bar p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    .table-wrap { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.87rem; white-space: nowrap; }
    thead tr { background: var(--primary); color: #fff; }
    th, td   { padding: 9px 14px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { text-align: left; }
    tbody tr:nth-child(even) { background: var(--neutral-bg); }
    tbody tr:hover { background: var(--primary-bg); cursor: pointer; }
    td.cell-ok { color: var(--success); font-weight: 700; }
    td.cell-ng { color: var(--danger);  font-weight: 700; background: var(--danger-bg); }

    /* 詳細モーダル内 解答グリッド */
    .detail-score-wrap { text-align: center; padding: 8px 0 20px; }
    .detail-score-num { font-size: 3rem; font-weight: 800; }
    .detail-score-num.pass { color: var(--success); }
    .detail-score-num.fail { color: var(--danger); }
    .detail-score-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

    .result-answer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
      gap: 6px;
    }
    .result-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 11px; border-radius: var(--radius);
      border: 1.5px solid var(--border); background: var(--neutral-bg);
    }
    .result-row.ok { border-color: var(--success); background: var(--success-bg); }
    .result-row.ng { border-color: var(--danger);  background: var(--danger-bg); }
    .result-choices { display: flex; gap: 4px; }
    .result-choice {
      display: flex; align-items: center; justify-content: center;
      width: 29px; height: 29px; border: 1.5px solid #b0bec5;
      border-radius: 50%; font-size: 0.84rem; font-weight: 600; color: var(--text-muted);
    }
    .result-choice.r-ok { background: var(--success); border-color: var(--success); color: #fff; }
    .result-choice.r-ng { background: var(--danger);  border-color: var(--danger);  color: #fff; }
    .result-choice.r-hint {
      border-color: var(--success); color: var(--success);
      outline: 2px dashed var(--success); outline-offset: -2px;
    }
    .result-note { font-size: 0.73rem; color: var(--danger); margin-left: auto; white-space: nowrap; }

    /* URL コピー */
    .url-display {
      display: flex; gap: 8px; align-items: center; margin-top: 10px;
    }
    .url-display input { font-size: 0.82rem; background: #f5f7fa; }
  </style>
</head>
<body>

<!-- ========== TOPBAR ========== -->
<div class="topbar" id="topbar">
  <span class="topbar-title" id="topbar-title">📋 建施 模擬試験 管理システム</span>
  <div class="topbar-right" id="topbar-actions"></div>
</div>

<!-- ========== LOGIN ========== -->
<div id="pg-login">
  <div class="login-box">
    <div class="login-logo">管理者パネル</div>
    <div class="login-sub">建施 模擬試験 管理システム</div>
    <form onsubmit="doLogin(event)">
      <input class="pin-input" type="password" id="inp-pin"
        placeholder="••••••" maxlength="10" autocomplete="off" inputmode="numeric">
      <button type="submit" class="btn btn-primary btn-block btn-lg">ログイン</button>
      <div class="login-err" id="login-err">パスワードが違います</div>
    </form>
  </div>
</div>

<!-- ========== DASHBOARD ========== -->
<div id="pg-dashboard" style="display:none">
  <div class="page-wrap-lg">
    <div class="flex items-center justify-between flex-wrap gap-8 mt-20" style="margin-bottom:20px">
      <h2 style="font-size:1.15rem">テスト一覧</h2>
      <button class="btn btn-primary" onclick="navigate('create')">＋ 新しいテストを作成</button>
    </div>
    <div id="db-loading" class="loading-wrap"><div class="spinner"></div></div>
    <div id="db-folder-list"></div>
    <div id="db-empty" style="display:none;text-align:center;padding:60px;color:var(--text-muted)">
      <div style="font-size:2.5rem;margin-bottom:12px">📂</div>
      テストがありません。「新しいテストを作成」から追加してください。
    </div>
  </div>
</div>

<!-- ========== CREATE / EDIT ========== -->
<div id="pg-create" style="display:none">
  <div class="page-wrap" style="max-width:820px">
    <h2 id="create-heading" style="font-size:1.15rem;margin:20px 0">新しいテストを作成</h2>

    <div class="card" style="margin-bottom:20px">
      <div class="section-label" style="margin-bottom:16px">テスト基本情報</div>
      <div class="form-row">
        <div class="field">
          <label>テスト名<span class="req">*</span></label>
          <input type="text" id="c-title" placeholder="例：模擬①">
        </div>
        <div class="field folder-wrap">
          <label>フォルダ（分類）<span class="req">*</span></label>
          <input type="text" id="c-folder" placeholder="例：2024年度" autocomplete="off"
            oninput="onFolderInput()" onfocus="onFolderInput()" onblur="hideSug()">
          <div id="folder-suggestions"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>問題数<span class="req">*</span></label>
          <input type="number" id="c-qcount" value="72" min="1" max="200" oninput="rebuildKeyGrid()">
        </div>
        <div class="field">
          <label>選択肢数<span class="req">*</span></label>
          <input type="number" id="c-choices" value="5" min="2" max="10" oninput="rebuildKeyGrid()">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>合格ライン（%）<span class="req">*</span></label>
          <input type="number" id="c-passing" value="60" min="1" max="100">
        </div>
        <div class="field" style="justify-content:flex-end;align-items:flex-end">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:9px;font-size:0.88rem">
            <input type="checkbox" id="c-active" checked style="width:16px;height:16px">
            作成後すぐ受付開始する
          </label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="flex items-center section-label" style="margin-bottom:14px">
        正答キー設定
        <span class="key-counter" id="key-counter">0 / 0 問 入力済み</span>
      </div>
      <div class="key-grid" id="key-grid"></div>
    </div>

    <div style="display:flex;gap:12px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="navigate('dashboard')">キャンセル</button>
      <button class="btn btn-primary btn-lg" onclick="saveExam()" id="save-btn">保存する</button>
    </div>
  </div>
</div>

<!-- ========== RESULTS ========== -->
<div id="pg-results" style="display:none">
  <div class="exam-info-bar" id="res-info-bar">
    <h2 id="res-title">—</h2>
    <p  id="res-meta">—</p>
  </div>
  <div class="page-wrap-lg" style="padding-top:20px">
    <div class="stats-row">
      <div class="stat-card"><div class="label">受験者数</div><div class="value" id="st-total">—</div></div>
      <div class="stat-card"><div class="label">合格者数</div><div class="value pass" id="st-pass">—</div></div>
      <div class="stat-card"><div class="label">不合格者数</div><div class="value fail" id="st-fail">—</div></div>
      <div class="stat-card"><div class="label">平均点</div><div class="value" id="st-avg">—</div></div>
      <div class="stat-card"><div class="label">最高点</div><div class="value" id="st-max">—</div></div>
      <div class="stat-card"><div class="label">最低点</div><div class="value" id="st-min">—</div></div>
    </div>
    <div id="res-loading" class="loading-wrap"><div class="spinner"></div></div>
    <div class="table-wrap" id="res-table-wrap" style="display:none"></div>
    <div id="res-empty" style="display:none;text-align:center;padding:60px;color:var(--text-muted)">
      まだ回答が届いていません。
    </div>
  </div>
</div>

<!-- ========== URL コピーモーダル ========== -->
<div class="modal-overlay" id="url-modal">
  <div class="modal-box" style="max-width:500px">
    <button class="modal-close" onclick="closeModal('url-modal')">✕</button>
    <div class="section-label" style="margin-bottom:10px">受験者用URL</div>
    <div class="text-sm text-muted" style="margin-bottom:6px">以下のURLを受験者に共有してください</div>
    <div class="url-display">
      <input type="text" id="url-display-inp" readonly>
      <button class="btn btn-primary btn-sm" onclick="copyUrl()">コピー</button>
    </div>
  </div>
</div>

<!-- ========== 詳細モーダル ========== -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    <div class="section-label" style="margin-bottom:10px" id="modal-name-lbl">—</div>
    <div class="detail-score-wrap">
      <div class="detail-score-num" id="modal-score-num">—</div>
      <div class="detail-score-sub" id="modal-score-sub">—</div>
    </div>
    <div class="result-answer-grid" id="modal-ans-grid"></div>
  </div>
</div>

<div id="toast"></div>

<!-- ===============================================================
     SCRIPT
     =============================================================== -->
<script>
// ---- 定数 ----
const ADMIN_PASSWORD = "017663";
const SITE_BASE = (() => {
  const u = location.href.replace(/admin\.html.*$/, "");
  return u;
})();

// ---- 認証 ----
function isAuthed() { return sessionStorage.getItem("admin_ok") === "1"; }

function doLogin(e) {
  e.preventDefault();
  const pin = document.getElementById("inp-pin").value;
  const err = document.getElementById("login-err");
  if (pin === ADMIN_PASSWORD) {
    sessionStorage.setItem("admin_ok", "1");
    err.style.display = "none";
    navigate("dashboard");
  } else {
    err.style.display = "block";
    document.getElementById("inp-pin").value = "";
    document.getElementById("inp-pin").focus();
  }
}

function doLogout() {
  sessionStorage.removeItem("admin_ok");
  navigate("login");
}

// ---- ルーター ----
const PAGES = ["login","dashboard","create","results"];
let currentPage = "";
let currentParam = "";  // examId for create(edit) / results

function navigate(page, param = "") {
  window.location.hash = param ? `${page}/${param}` : page;
}

window.addEventListener("hashchange", handleRoute);
window.addEventListener("load", handleRoute);

function handleRoute() {
  const raw = window.location.hash.replace("#","");
  const [page, param] = raw.split("/");

  if (!isAuthed() && page !== "login" && raw !== "") {
    showPage("login"); return;
  }
  if (raw === "" || page === "login") {
    if (isAuthed()) { navigate("dashboard"); return; }
    showPage("login"); return;
  }
  showPage(page || "dashboard", param || "");
}

function showPage(page, param = "") {
  currentPage  = page;
  currentParam = param;

  PAGES.forEach(p => {
    const el = document.getElementById("pg-" + p);
    if (el) el.style.display = "none";
  });

  const topbar = document.getElementById("topbar");
  if (page === "login") {
    topbar.style.display = "none";
  } else {
    topbar.style.display = "flex";
    renderTopbar(page);
  }

  const target = document.getElementById("pg-" + page);
  if (target) target.style.display = "block";

  // ページ別初期化
  if (page === "dashboard") initDashboard();
  if (page === "create")    initCreate(param);
  if (page === "results")   initResults(param);
}

function renderTopbar(page) {
  document.getElementById("topbar-title").textContent = "📋 建施 模擬試験 管理システム";
  const act = document.getElementById("topbar-actions");
  act.innerHTML = "";

  if (page === "dashboard") {
    act.innerHTML = `<button class="btn btn-ghost-wh btn-sm" onclick="doLogout()">ログアウト</button>`;
  } else if (page === "create") {
    act.innerHTML = `<button class="btn btn-ghost-wh btn-sm" onclick="navigate('dashboard')">← ダッシュボード</button>`;
  } else if (page === "results") {
    act.innerHTML = `
      <button class="btn btn-ghost-wh btn-sm" onclick="exportCSV()">CSV エクスポート</button>
      <button class="btn btn-ghost-wh btn-sm" onclick="navigate('dashboard')">← ダッシュボード</button>`;
  }
}

// ================================================================
//  DASHBOARD
// ================================================================
async function initDashboard() {
  document.getElementById("db-loading").style.display = "block";
  document.getElementById("db-folder-list").innerHTML = "";
  document.getElementById("db-empty").style.display   = "none";

  try {
    const snap = await db.collection("exams").orderBy("createdAt","desc").get();
    const exams = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    document.getElementById("db-loading").style.display = "none";

    if (exams.length === 0) {
      document.getElementById("db-empty").style.display = "block"; return;
    }

    const folders = {};
    exams.forEach(e => {
      const f = e.folder || "未分類";
      if (!folders[f]) folders[f] = [];
      folders[f].push(e);
    });

    const list = document.getElementById("db-folder-list");
    list.innerHTML = "";
    Object.entries(folders).forEach(([folder, items]) => {
      list.appendChild(buildFolderSection(folder, items));
    });
  } catch(err) {
    document.getElementById("db-loading").innerHTML =
      `<p style="color:var(--danger);text-align:center">読み込み失敗：${err.message}</p>`;
  }
}

function buildFolderSection(folderName, exams) {
  const sec = document.createElement("div");
  sec.className = "folder-section";
  const hdr = document.createElement("div");
  hdr.className = "folder-header";
  hdr.innerHTML = `
    <span style="font-size:1.1rem">📁</span>
    <span class="folder-name">${esc(folderName)}</span>
    <span class="text-sm text-muted">${exams.length} 件</span>
    <span class="folder-chevron">▾</span>`;
  const body = document.createElement("div");
  body.className = "folder-body";
  hdr.addEventListener("click", () => {
    hdr.classList.toggle("collapsed");
    body.classList.toggle("hidden");
  });
  exams.forEach(e => body.appendChild(buildExamCard(e)));
  sec.appendChild(hdr);
  sec.appendChild(body);
  return sec;
}

function buildExamCard(exam) {
  const card = document.createElement("div");
  card.className = "exam-card";
  const dt = exam.createdAt?.toDate ? exam.createdAt.toDate() : new Date();
  const dateStr = dt.toLocaleDateString("ja-JP", { year:"numeric",month:"short",day:"numeric" });
  card.innerHTML = `
    <div class="exam-card-info">
      <div class="exam-card-title">${esc(exam.title)}</div>
      <div class="exam-card-meta">${exam.questionCount||72} 問 ／ 選択肢 ${exam.choices||5} ／ 合格 ${exam.passingScore||60}% 以上 ・ ${dateStr}</div>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-lbl" id="tgl-lbl-${exam.id}">${exam.isActive ? "受付中" : "停止中"}</span>
      <input type="checkbox" class="toggle" id="tgl-${exam.id}" ${exam.isActive ? "checked" : ""}
        onchange="toggleActive('${exam.id}', this.checked)">
    </div>
    <div class="exam-card-actions">
      <button class="btn btn-ghost btn-sm" onclick="showUrlModal('${exam.id}')">URL</button>
      <button class="btn btn-primary btn-sm" onclick="navigate('results','${exam.id}')">採点結果</button>
      <button class="btn btn-neutral btn-sm" onclick="navigate('create','${exam.id}')">編集</button>
      <button class="btn btn-danger btn-sm" onclick="deleteExam('${exam.id}','${esc(exam.title).replace(/'/g,"\\'")}')">削除</button>
    </div>`;
  return card;
}

async function toggleActive(examId, isActive) {
  try {
    await db.collection("exams").doc(examId).update({ isActive });
    document.getElementById("tgl-lbl-" + examId).textContent = isActive ? "受付中" : "停止中";
    showToast(isActive ? "受付を開始しました" : "受付を停止しました");
  } catch(e) {
    document.getElementById("tgl-" + examId).checked = !isActive;
    showToast("更新失敗：" + e.message);
  }
}

async function deleteExam(examId, title) {
  if (!confirm(`「${title}」を削除しますか？`)) return;
  try {
    await db.collection("exams").doc(examId).delete();
    showToast("削除しました");
    initDashboard();
  } catch(e) { showToast("削除失敗：" + e.message); }
}

function showUrlModal(examId) {
  document.getElementById("url-display-inp").value = `${SITE_BASE}exam.html?id=${examId}`;
  document.getElementById("url-modal").classList.add("open");
}
function copyUrl() {
  navigator.clipboard.writeText(document.getElementById("url-display-inp").value)
    .then(() => showToast("URLをコピーしました"));
}

// ================================================================
//  CREATE / EDIT
// ================================================================
let editingExamId = null;
let existingFolders = [];

async function initCreate(examId) {
  editingExamId = examId || null;
  document.getElementById("create-heading").textContent = examId ? "テストを編集" : "新しいテストを作成";

  // フォルダ候補取得
  const snap = await db.collection("exams").get();
  const fset = new Set();
  snap.docs.forEach(d => { if (d.data().folder) fset.add(d.data().folder); });
  existingFolders = [...fset];

  if (examId) {
    const doc = await db.collection("exams").doc(examId).get();
    if (doc.exists) populateCreateForm(doc.data());
    else rebuildKeyGrid();
  } else {
    // リセット
    document.getElementById("c-title").value   = "";
    document.getElementById("c-folder").value  = "";
    document.getElementById("c-qcount").value  = "72";
    document.getElementById("c-choices").value = "5";
    document.getElementById("c-passing").value = "60";
    document.getElementById("c-active").checked= true;
    rebuildKeyGrid();
  }
}

function populateCreateForm(data) {
  document.getElementById("c-title").value   = data.title   || "";
  document.getElementById("c-folder").value  = data.folder  || "";
  document.getElementById("c-qcount").value  = data.questionCount || 72;
  document.getElementById("c-choices").value = data.choices || 5;
  document.getElementById("c-passing").value = data.passingScore || 60;
  document.getElementById("c-active").checked = !!data.isActive;
  rebuildKeyGrid(data.answerKey || {});
}

function rebuildKeyGrid(existingKey = {}) {
  const qcount  = parseInt(document.getElementById("c-qcount").value)  || 72;
  const choices = parseInt(document.getElementById("c-choices").value) || 5;
  const grid    = document.getElementById("key-grid");
  grid.innerHTML = "";

  for (let q = 1; q <= qcount; q++) {
    const row = document.createElement("div");
    row.className = "key-row";
    row.dataset.q = q;

    const qn = document.createElement("span");
    qn.className = "key-qnum";
    qn.textContent = `問 ${q}`;
    row.appendChild(qn);

    const cg = document.createElement("div");
    cg.className = "key-choices";

    for (let c = 1; c <= choices; c++) {
      const id = `key_q${q}_c${c}`;
      const radio = document.createElement("input");
      radio.type  = "radio"; radio.name = `key_q${q}`; radio.value = c; radio.id = id;

      const existing = parseInt(existingKey[q] || existingKey[String(q)]);
      if (existing === c) radio.checked = true;

      radio.addEventListener("change", () => {
        row.classList.add("filled");
        row.classList.remove("key-unanswered");
        updateKeyCounter();
      });
      const lbl = document.createElement("label");
      lbl.htmlFor = id; lbl.textContent = c;
      cg.appendChild(radio); cg.appendChild(lbl);
    }
    row.appendChild(cg);
    if (existingKey[q] || existingKey[String(q)]) row.classList.add("filled");
    grid.appendChild(row);
  }
  updateKeyCounter();
}

function updateKeyCounter() {
  const qcount = parseInt(document.getElementById("c-qcount").value) || 72;
  let filled = 0;
  for (let q = 1; q <= qcount; q++) {
    if (document.querySelector(`input[name="key_q${q}"]:checked`)) filled++;
  }
  document.getElementById("key-counter").textContent = `${filled} / ${qcount} 問 入力済み`;
}

async function saveExam() {
  const title   = document.getElementById("c-title").value.trim();
  const folder  = document.getElementById("c-folder").value.trim();
  const qcount  = parseInt(document.getElementById("c-qcount").value);
  const choices = parseInt(document.getElementById("c-choices").value);
  const passing = parseInt(document.getElementById("c-passing").value);
  const isActive= document.getElementById("c-active").checked;

  if (!title)  { showToast("テスト名を入力してください"); return; }
  if (!folder) { showToast("フォルダを入力してください"); return; }

  const answerKey = {};
  const unanswered = [];
  for (let q = 1; q <= qcount; q++) {
    const sel = document.querySelector(`input[name="key_q${q}"]:checked`);
    if (!sel) {
      unanswered.push(q);
      document.querySelector(`.key-row[data-q="${q}"]`).classList.add("key-unanswered");
    } else {
      answerKey[q] = parseInt(sel.value);
    }
  }
  if (unanswered.length) {
    showToast(`正答未入力：問 ${unanswered.slice(0,5).join("、")}${unanswered.length>5?"…":""}`);
    document.querySelector(`.key-row[data-q="${unanswered[0]}"]`)
      .scrollIntoView({ behavior:"smooth", block:"center" });
    return;
  }

  const btn = document.getElementById("save-btn");
  btn.disabled = true; btn.textContent = "保存中...";

  const data = {
    title, folder, questionCount: qcount, choices, passingScore: passing,
    isActive, answerKey,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    if (editingExamId) {
      await db.collection("exams").doc(editingExamId).update(data);
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection("exams").add(data);
    }
    showToast(editingExamId ? "更新しました" : "作成しました");
    setTimeout(() => navigate("dashboard"), 900);
  } catch(e) {
    btn.disabled = false; btn.textContent = "保存する";
    showToast("保存失敗：" + e.message);
  }
}

// フォルダサジェスト
function onFolderInput() {
  const val = document.getElementById("c-folder").value.toLowerCase();
  const matches = existingFolders.filter(f => f.toLowerCase().includes(val));
  const sug = document.getElementById("folder-suggestions");
  if (!matches.length) { sug.style.display = "none"; return; }
  sug.innerHTML = matches.map(f =>
    `<div class="sug-item" onmousedown="pickFolder('${f.replace(/'/g,"\\'")}')">📁 ${f}</div>`
  ).join("");
  sug.style.display = "block";
}
function pickFolder(f) {
  document.getElementById("c-folder").value = f;
  document.getElementById("folder-suggestions").style.display = "none";
}
function hideSug() { setTimeout(() => { document.getElementById("folder-suggestions").style.display = "none"; }, 150); }

// ================================================================
//  RESULTS
// ================================================================
let resExamData   = null;
let resSubmissions= [];

async function initResults(examId) {
  if (!examId) { navigate("dashboard"); return; }

  document.getElementById("res-title").textContent    = "読み込み中...";
  document.getElementById("res-meta").textContent     = "";
  document.getElementById("res-loading").style.display= "block";
  document.getElementById("res-table-wrap").style.display = "none";
  document.getElementById("res-empty").style.display  = "none";
  ["st-total","st-pass","st-fail","st-avg","st-max","st-min"].forEach(id =>
    document.getElementById(id).textContent = "—");

  try {
    const examSnap = await db.collection("exams").doc(examId).get();
    if (!examSnap.exists) { showToast("テストが見つかりません"); navigate("dashboard"); return; }
    resExamData = examSnap.data();

    document.getElementById("res-title").textContent = resExamData.title;
    document.getElementById("res-meta").textContent  =
      `全 ${resExamData.questionCount||72} 問 ／ 選択肢 ${resExamData.choices||5} ／ 合格ライン ${resExamData.passingScore||60}% 以上`;

    const subsSnap = await db.collection("submissions")
      .where("examId","==", examId)
      .orderBy("submittedAt","desc")
      .get();
    resSubmissions = subsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    document.getElementById("res-loading").style.display = "none";
    renderResStats();
    renderResTable(examId);
  } catch(e) {
    document.getElementById("res-loading").innerHTML =
      `<p style="color:var(--danger);text-align:center">エラー：${e.message}</p>`;
  }
}

function renderResStats() {
  const total = resSubmissions.length;
  if (!total) return;
  const pass  = resSubmissions.filter(s => s.passed).length;
  const scores= resSubmissions.map(s => s.score);
  const avg   = Math.round(scores.reduce((a,b) => a+b, 0) / total);
  document.getElementById("st-total").textContent = total;
  document.getElementById("st-pass").textContent  = pass;
  document.getElementById("st-fail").textContent  = total - pass;
  document.getElementById("st-avg").textContent   = avg + "%";
  document.getElementById("st-max").textContent   = Math.max(...scores) + "%";
  document.getElementById("st-min").textContent   = Math.min(...scores) + "%";
}

function renderResTable(examId) {
  if (!resSubmissions.length) {
    document.getElementById("res-empty").style.display = "block"; return;
  }
  const qcount = resExamData.questionCount || 72;

  let qHdr = "";
  for (let q = 1; q <= qcount; q++) qHdr += `<th>問${q}</th>`;

  let rows = "";
  resSubmissions.forEach((s, idx) => {
    const dt = s.submittedAt?.toDate ? s.submittedAt.toDate() : new Date();
    const dateStr = dt.toLocaleString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});

    let cells = "";
    for (let q = 1; q <= qcount; q++) {
      const r   = s.results?.[q] || s.results?.[String(q)];
      const ans = r ? r.answer : "—";
      const ok  = r ? r.correct : false;
      cells += `<td class="${ok ? "cell-ok" : "cell-ng"}">${ans}</td>`;
    }
    rows += `
      <tr onclick="showDetail(${idx})">
        <td>${resSubmissions.length - idx}</td>
        <td style="text-align:left">
          <strong>${esc(s.name)}</strong>
          ${s.company  ? `<br><span class="text-sm text-muted">${esc(s.company)}</span>`  : ""}
          ${s.studentId? `<br><span class="text-sm text-muted">${esc(s.studentId)}</span>`: ""}
        </td>
        <td>${dateStr}</td>
        <td><strong>${s.correct} / ${s.total}</strong></td>
        <td><strong>${s.score}%</strong></td>
        <td><span class="badge ${s.passed?"badge-pass":"badge-fail"}">${s.passed?"合格":"不合格"}</span></td>
        ${cells}
      </tr>`;
  });

  const tw = document.getElementById("res-table-wrap");
  tw.style.display = "block";
  tw.innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>受験者</th><th>送信日時</th><th>正解数</th><th>得点</th><th>判定</th>
        ${qHdr}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function showDetail(idx) {
  const s      = resSubmissions[idx];
  const qcount = resExamData.questionCount || 72;
  const choices= resExamData.choices || 5;
  const key    = resExamData.answerKey || {};

  document.getElementById("modal-name-lbl").textContent =
    `${s.name}${s.company ? "（"+s.company+"）" : ""}${s.studentId ? " ／ "+s.studentId : ""}`;

  const sn = document.getElementById("modal-score-num");
  sn.textContent = s.score + "%";
  sn.className   = "detail-score-num " + (s.passed ? "pass" : "fail");
  document.getElementById("modal-score-sub").textContent =
    `${s.correct} 問正解 ／ 全 ${s.total} 問　　${s.passed ? "✅ 合格" : "❌ 不合格"}`;

  let html = "";
  for (let q = 1; q <= qcount; q++) {
    const r      = s.results?.[q] || s.results?.[String(q)];
    const ans    = r ? r.answer : null;
    const isOk   = r ? r.correct : false;
    const correct= parseInt(key[q] || key[String(q)]);

    let choicesHtml = "";
    for (let c = 1; c <= choices; c++) {
      let cls = "";
      if (c === ans &&  isOk) cls = "r-ok";
      if (c === ans && !isOk) cls = "r-ng";
      if (!isOk && c === correct) cls = "r-hint";
      choicesHtml += `<div class="result-choice ${cls}">${c}</div>`;
    }
    const note = !isOk ? `<span class="result-note">正解：${correct}</span>` : "";

    html += `
      <div class="result-row ${isOk ? "ok" : "ng"}">
        <span class="q-num">問 ${q}</span>
        <div class="result-choices">${choicesHtml}</div>
        ${note}
      </div>`;
  }
  document.getElementById("modal-ans-grid").innerHTML = html;
  document.getElementById("detail-modal").classList.add("open");
}

// CSV エクスポート
function exportCSV() {
  if (!resSubmissions.length) { showToast("データがありません"); return; }
  const qcount = resExamData.questionCount || 72;
  const hdr = ["#","氏名","企業名","受験番号","送信日時","正解数","得点(%)","合否"];
  for (let q = 1; q <= qcount; q++) hdr.push(`問${q}`);

  const rows = resSubmissions.map((s,i) => {
    const dt = s.submittedAt?.toDate ? s.submittedAt.toDate().toLocaleString("ja-JP") : "";
    const row = [i+1, s.name, s.company||"", s.studentId||"", dt, s.correct, s.score, s.passed?"合格":"不合格"];
    for (let q = 1; q <= qcount; q++) row.push(s.answers?.[q] || s.answers?.[String(q)] || "");
    return row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",");
  });

  const csv  = "\uFEFF" + [hdr.map(h=>`"${h}"`).join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob),
    download: `${resExamData.title}_results_${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ---- 共通ユーティリティ ----
function closeModal(id) {
  document.getElementById(id).classList.remove("open");
}
document.querySelectorAll(".modal-overlay").forEach(el =>
  el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); })
);

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2800);
}

function esc(str) {
  return String(str||"").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
